version: '3.8'

services:
  # ── MongoDB ──────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: rh_mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: research_helper

  # ── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rh_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  # ── Backend API ──────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: rh_server
    restart: unless-stopped
    ports:
      - '${PORT:-5000}:5000'
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongo:27017/research_helper
      REDIS_URL: redis://redis:6379
    depends_on:
      - mongo
      - redis
    volumes:
      - ./server:/app/server
      - /app/server/node_modules

  # ── BullMQ Worker ────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: rh_worker
    restart: unless-stopped
    command: node server/src/workers/index.js
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongo:27017/research_helper
      REDIS_URL: redis://redis:6379
    depends_on:
      - mongo
      - redis

  # ── Frontend ─────────────────────────────────────────────
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: rh_client
    restart: unless-stopped
    ports:
      - '5173:5173'
    volumes:
      - ./client:/app/client
      - /app/client/node_modules

volumes:
  mongo_data:
  redis_data:
